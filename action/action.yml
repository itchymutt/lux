name: 'Gaze Effect Check'
description: 'See what your code does to the world before it runs. Static effect analysis for Python.'
author: 'Roberta Carraro'

inputs:
  path:
    description: 'File or directory to scan'
    required: true
  deny:
    description: 'Comma-separated effects to deny (e.g. "Unsafe,Db")'
    required: false
    default: ''
  policy:
    description: 'Path to a .gazepolicy file'
    required: false
    default: ''
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.12'

outputs:
  effects:
    description: 'JSON array of all effects found across scanned files'
    value: ${{ steps.scan.outputs.effects }}
  passed:
    description: 'Whether the check passed (true/false)'
    value: ${{ steps.scan.outputs.passed }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install libgaze
      shell: bash
      run: pip install libgaze

    - name: Scan
      id: scan
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_DENY: ${{ inputs.deny }}
        INPUT_POLICY: ${{ inputs.policy }}
      run: |
        set +e

        # Collect all Python files (handles spaces in filenames)
        if [ -d "$INPUT_PATH" ]; then
          FILES=()
          while IFS= read -r -d '' f; do
            FILES+=("$f")
          done < <(find "$INPUT_PATH" -name "*.py" -not -path "*/node_modules/*" -not -path "*/.venv/*" -not -path "*/venv/*" -print0 | sort -z)
        else
          FILES=("$INPUT_PATH")
        fi

        FAILED=0
        EFFECTS_FILE=$(mktemp)
        echo "[]" > "$EFFECTS_FILE"

        for f in "${FILES[@]}"; do
          echo "::group::$f"

          # Get JSON output (single analysis per file)
          FILE_JSON=$(libgaze check "$f" --json 2>/dev/null)

          if [ -n "$INPUT_POLICY" ]; then
            libgaze policy "$f" -p "$INPUT_POLICY"
            if [ $? -ne 0 ]; then FAILED=1; fi
          elif [ -n "$INPUT_DENY" ]; then
            libgaze check "$f" --deny "$INPUT_DENY"
            if [ $? -ne 0 ]; then FAILED=1; fi
          else
            libgaze check "$f"
          fi

          # Merge effects into collection
          if [ -n "$FILE_JSON" ]; then
            python3 -c "
        import json, sys
        existing = json.load(open('$EFFECTS_FILE'))
        new = json.loads(sys.stdin.read()).get('effects', [])
        merged = sorted(set(existing + new))
        json.dump(merged, open('$EFFECTS_FILE', 'w'))
        " <<< "$FILE_JSON" 2>/dev/null
          fi

          echo "::endgroup::"
        done

        # Write outputs
        ALL_EFFECTS=$(cat "$EFFECTS_FILE")
        rm -f "$EFFECTS_FILE"
        echo "effects=$ALL_EFFECTS" >> "$GITHUB_OUTPUT"

        if [ $FAILED -eq 1 ]; then
          echo "passed=false" >> "$GITHUB_OUTPUT"
          exit 1
        else
          echo "passed=true" >> "$GITHUB_OUTPUT"
        fi

branding:
  icon: 'eye'
  color: 'blue'
